<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Farabi</title>
  <meta name="description" content="Photo gallery by Md. Mazidul Haque Farabi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f4ff;
      --muted: #8b9cb8;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.45);
      --pink: #ec4899;
      --cyan: #22d3ee;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient__orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .ambient__orb--1 {
      width: 55vw; height: 55vw;
      top: -15%; left: -10%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    }
    .ambient__orb--2 {
      width: 45vw; height: 45vw;
      bottom: -10%; right: -5%;
      background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
      animation-delay: -6s;
    }
    .ambient__orb--3 {
      width: 30vw; height: 30vw;
      top: 40%; left: 50%;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      animation-delay: -12s;
      opacity: 0.2;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(4%, 6%) scale(1.08); }
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 0 1rem;
      gap: 1rem;
    }
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      background: var(--surface);
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
    }
    .back-link:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
      transform: translateX(-2px);
    }

    .hero {
      text-align: center;
      padding: 1.5rem 0 2.5rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 300;
    }
    .hero .count-badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--cyan);
      background: rgba(34, 211, 238, 0.08);
      border: 1px solid rgba(34, 211, 238, 0.2);
    }

    /* Main carousel */
    .carousel-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }
    .carousel-frame {
      border-radius: 20px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 30px 80px rgba(0,0,0,0.55);
    }

    .main-swiper {
      width: 100%;
      height: clamp(320px, 62vh, 680px);
    }
    .main-swiper .swiper-slide {
      width: min(78vw, 900px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: zoom-in;
    }
    .main-swiper .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .main-swiper .swiper-slide-active img {
      transform: scale(1);
    }
    .main-swiper .swiper-slide:not(.swiper-slide-active) img {
      transform: scale(0.92);
      opacity: 0.55;
    }

    /* Custom nav buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(5, 8, 16, 0.75);
      backdrop-filter: blur(16px);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .nav-btn:hover {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translateY(-50%) scale(1.06);
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn--prev { left: -18px; }
    .nav-btn--next { right: -18px; }

    @media (max-width: 768px) {
      .nav-btn { width: 42px; height: 42px; }
      .nav-btn--prev { left: 8px; }
      .nav-btn--next { right: 8px; }
    }

    /* Controls bar */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0;
    }
    .slide-counter {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
    }
    .slide-counter span {
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 600;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ctrl-btn {
      padding: 0.55rem 1.1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.45);
    }
    .ctrl-btn svg {
      width: 16px; height: 16px;
      vertical-align: -3px;
      margin-right: 4px;
    }

    /* Thumbnail strip */
    .thumb-swiper {
      padding: 0.5rem 0 1.5rem;
    }
    .thumb-swiper .swiper-slide {
      width: 88px;
      height: 66px;
      border-radius: 10px;
      overflow: hidden;
      opacity: 0.45;
      cursor: pointer;
      border: 2px solid transparent;
      transition: opacity 0.25s, border-color 0.25s, transform 0.25s;
    }
    .thumb-swiper .swiper-slide-thumb-active {
      opacity: 1;
      border-color: var(--accent);
      transform: scale(1.05);
    }
    .thumb-swiper .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Grid section */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      margin: 2rem 0 1.25rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .grid-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,8,16,0.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .grid-item:hover img { transform: scale(1.08); }
    .grid-item:hover::after { opacity: 1; }
    .grid-item .num {
      position: absolute;
      bottom: 8px;
      left: 10px;
      z-index: 1;
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .grid-item:hover .num { opacity: 1; transform: translateY(0); }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5, 8, 16, 0.94);
      backdrop-filter: blur(24px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s, visibility 0.35s;
    }
    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }
    .lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      transform: scale(0.94);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .lightbox.open img { transform: scale(1); }
    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.1); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-nav:hover { background: rgba(99,102,241,0.25); }
    .lightbox-nav--prev { left: 1.25rem; }
    .lightbox-nav--next { right: 1.25rem; }
    .lightbox-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* Progress bar */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      border-radius: 999px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* Swiper pagination override */
    .main-swiper .swiper-pagination-bullet {
      background: var(--muted);
      opacity: 0.4;
      width: 8px; height: 8px;
    }
    .main-swiper .swiper-pagination-bullet-active {
      background: var(--accent);
      opacity: 1;
      width: 24px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="ambient" aria-hidden="true">
    <div class="ambient__orb ambient__orb--1"></div>
    <div class="ambient__orb ambient__orb--2"></div>
    <div class="ambient__orb ambient__orb--3"></div>
  </div>

  <div class="page">
    <header>
      <a class="logo" href="/">Farabi</a>
      <a class="back-link" href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to site
      </a>
    </header>

    <section class="hero">
      <h1>Photo Gallery</h1>
      <p>A curated collection of moments</p>
      <div class="count-badge" id="countBadge">42 photos</div>
    </section>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="carousel-wrap">
      <div class="carousel-frame">
        <div class="swiper main-swiper" id="mainSwiper">
          <div class="swiper-wrapper" id="mainSlides"></div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
      <button class="nav-btn nav-btn--prev" id="btnPrev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="nav-btn nav-btn--next" id="btnNext" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="controls-bar">
      <div class="slide-counter">
        <span id="currentNum">1</span> / <span id="totalNum">42</span>
      </div>
      <div class="control-group">
        <button class="ctrl-btn active" id="btnAutoplay" aria-pressed="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Autoplay
        </button>
        <button class="ctrl-btn" id="btnFullscreen" aria-label="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          Expand
        </button>
      </div>
    </div>

    <div class="swiper thumb-swiper" id="thumbSwiper">
      <div class="swiper-wrapper" id="thumbSlides"></div>
    </div>

    <h2 class="section-title">Browse all</h2>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-nav--prev" id="lbPrev" aria-label="Previous">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img id="lbImg" src="" alt="">
    <button class="lightbox-nav lightbox-nav--next" id="lbNext" aria-label="Next">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lightbox-caption" id="lbCaption"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const TOTAL = 42;
    const images = Array.from({ length: TOTAL }, (_, i) => `images/${i + 1}.jfif`);

    const mainSlides = document.getElementById('mainSlides');
    const thumbSlides = document.getElementById('thumbSlides');
    const grid = document.getElementById('grid');

    images.forEach((src, i) => {
      const n = i + 1;
      mainSlides.innerHTML += `
        <div class="swiper-slide" data-index="${i}">
          <img src="${src}" alt="Photo ${n}" loading="${i < 3 ? 'eager' : 'lazy'}">
        </div>`;
      thumbSlides.innerHTML += `
        <div class="swiper-slide">
          <img src="${src}" alt="Thumbnail ${n}" loading="lazy">
        </div>`;
      grid.innerHTML += `
        <div class="grid-item" data-index="${i}">
          <img src="${src}" alt="Photo ${n}" loading="lazy">
          <span class="num">${n}</span>
        </div>`;
    });

    document.getElementById('totalNum').textContent = TOTAL;
    document.getElementById('countBadge').textContent = `${TOTAL} photos`;

    const thumbSwiper = new Swiper('#thumbSwiper', {
      spaceBetween: 10,
      slidesPerView: 'auto',
      freeMode: true,
      watchSlidesProgress: true,
      breakpoints: {
        480: { slidesPerView: 5 },
        768: { slidesPerView: 8 },
        1100: { slidesPerView: 12 }
      }
    });

    let autoplayOn = true;
    const mainSwiper = new Swiper('#mainSwiper', {
      effect: 'coverflow',
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: 'auto',
      loop: true,
      speed: 700,
      coverflowEffect: {
        rotate: 0,
        stretch: 0,
        depth: 120,
        modifier: 2.2,
        slideShadows: false
      },
      autoplay: { delay: 3500, disableOnInteraction: false, pauseOnMouseEnter: true },
      pagination: { el: '.swiper-pagination', clickable: true },
      thumbs: { swiper: thumbSwiper },
      keyboard: { enabled: true },
      on: {
        slideChange(s) {
          const idx = s.realIndex;
          updateCounter(idx);
          updateProgress(idx);
        }
      }
    });

    function updateCounter(idx) {
      document.getElementById('currentNum').textContent = idx + 1;
    }
    function updateProgress(idx) {
      document.getElementById('progressFill').style.width = `${((idx + 1) / TOTAL) * 100}%`;
    }
    updateProgress(0);

    document.getElementById('btnPrev').addEventListener('click', () => mainSwiper.slidePrev());
    document.getElementById('btnNext').addEventListener('click', () => mainSwiper.slideNext());

    const btnAutoplay = document.getElementById('btnAutoplay');
    btnAutoplay.addEventListener('click', () => {
      autoplayOn = !autoplayOn;
      if (autoplayOn) {
        mainSwiper.autoplay.start();
        btnAutoplay.classList.add('active');
        btnAutoplay.setAttribute('aria-pressed', 'true');
      } else {
        mainSwiper.autoplay.stop();
        btnAutoplay.classList.remove('active');
        btnAutoplay.setAttribute('aria-pressed', 'false');
      }
    });

    /* Lightbox */
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');
    let lbIndex = 0;

    function openLightbox(index) {
      lbIndex = index;
      lbImg.src = images[index];
      lbCaption.textContent = `Photo ${index + 1} of ${TOTAL}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    function lbNav(dir) {
      lbIndex = (lbIndex + dir + TOTAL) % TOTAL;
      lbImg.src = images[lbIndex];
      lbCaption.textContent = `Photo ${lbIndex + 1} of ${TOTAL}`;
      mainSwiper.slideToLoop(lbIndex);
    }

    document.getElementById('btnFullscreen').addEventListener('click', () => openLightbox(mainSwiper.realIndex));
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => lbNav(-1));
    document.getElementById('lbNext').addEventListener('click', () => lbNav(1));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    document.querySelectorAll('.main-swiper .swiper-slide').forEach(slide => {
      slide.addEventListener('click', () => openLightbox(+slide.dataset.index));
    });
    document.querySelectorAll('.grid-item').forEach(item => {
      item.addEventListener('click', () => {
        const idx = +item.dataset.index;
        mainSwiper.slideToLoop(idx);
        openLightbox(idx);
      });
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) {
        if (e.key === 'ArrowLeft') mainSwiper.slidePrev();
        if (e.key === 'ArrowRight') mainSwiper.slideNext();
        return;
      }
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbNav(-1);
      if (e.key === 'ArrowRight') lbNav(1);
    });
  </script>
</body>
</html>
